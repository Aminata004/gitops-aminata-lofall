name: CI - Build, Lint, Test

on:
  push:
    branches: [main]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Helm
        uses: azure/setup-helm@v4

      - name: Helm lint du chart
        run: helm lint chart/

      - name: Build de l'image Docker
        run: docker build -t aminata-lofall-app:${{ github.sha }} app/

      - name: Test rapide - vérifier que l'image démarre
        run: |
          docker run -d -p 5000:5000 --name test-container aminata-lofall-app:${{ github.sha }}
          sleep 3
          curl -f http://localhost:5000/health || exit 1
          docker stop test-container